<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tourist Assistant</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    background: #f9f9f9;
    color: #333;
  }
  header {
    background: #4CAF50;
    color: white;
    padding: 1rem;
    text-align: center;
  }
  h1 {
    margin: 0;
    font-size: 2rem;
  }
  main {
    max-width: 900px;
    margin: 2rem auto;
    padding: 1rem;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: bold;
  }
  select, button {
    width: 100%;
    padding: 0.5rem;
    font-size: 1rem;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  button {
    background: #4CAF50;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover {
    background: #45a049;
  }
  #output {
    margin-top: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
  }
  .card {
    background: white;
    padding: 1rem;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-align: center;
  }
  .card img {
    max-width: 100%;
    border-radius: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>AI Tourist Assistant</h1>
  <p>Discover Singapore attractions based on activity, budget, and duration</p>
</header>

<main>
  <div class="form-group">
    <label for="activityType">Select Activity:</label>
    <select id="activityType">
      <option value="Nature">Nature</option>
      <option value="Cultural">Cultural</option>
      <option value="Adventure">Adventure</option>
      <option value="Food">Food</option>
    </select>
  </div>

  <div class="form-group">
    <label for="budget">Budget:</label>
    <select id="budget">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
  </div>

  <div class="form-group">
    <label for="duration">Trip Duration:</label>
    <select id="duration">
      <option value="Short">Short</option>
      <option value="Medium">Medium</option>
      <option value="Long">Long</option>
    </select>
  </div>

  <button id="getRecommendations">Get Recommendations</button>

  <div id="output"></div>
</main>

<script>
const attractions = [
  { name: "Botanic Gardens", type: "Nature", budget: "Low", duration: "Short", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Singapore_Botanic_Gardens_01.jpg/320px-Singapore_Botanic_Gardens_01.jpg" },
  { name: "MacRitchie Reservoir", type: "Nature", budget: "Low", duration: "Medium", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/MacRitchie_Reservoir_-_Singapore.jpg/320px-MacRitchie_Reservoir_-_Singapore.jpg" },
  { name: "Chinatown", type: "Cultural", budget: "Low", duration: "Short", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Chinatown_Singapore_-_2012.jpg/320px-Chinatown_Singapore_-_2012.jpg" },
  { name: "Little India", type: "Cultural", budget: "Medium", duration: "Medium", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Little_India_Singapore_Street_View.jpg/320px-Little_India_Singapore_Street_View.jpg" },
  { name: "Sentosa Zipline", type: "Adventure", budget: "High", duration: "Short", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Sentosa_Adventure_Cable.jpg/320px-Sentosa_Adventure_Cable.jpg" },
  { name: "Forest Adventure", type: "Adventure", budget: "Medium", duration: "Medium", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Forest_Adventure_Singapore.jpg/320px-Forest_Adventure_Singapore.jpg" },
  { name: "Lau Pa Sat", type: "Food", budget: "Low", duration: "Short", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Lau_Pa_Sat_Singapore.jpg/320px-Lau_Pa_Sat_Singapore.jpg" },
  { name: "Newton Food Centre", type: "Food", budget: "Medium", duration: "Medium", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Newton_Food_Centre_Singapore.jpg/320px-Newton_Food_Centre_Singapore.jpg" }
];

document.getElementById("getRecommendations").addEventListener("click", () => {
  const activity = document.getElementById("activityType").value;
  const budget = document.getElementById("budget").value;
  const duration = document.getElementById("duration").value;

  const results = attractions.filter(a => a.type === activity && a.budget === budget && a.duration === duration);

  const outputDiv = document.getElementById("output");
  outputDiv.innerHTML = "";

  if(results.length === 0){
    outputDiv.innerHTML = "<p>No matching attractions. Try another combination!</p>";
  } else {
    results.forEach(r => {
      const card = document.createElement("div");
      card.classList.add("card");
      card.innerHTML = `<img src="${r.img}" alt="${r.name}"><h3>${r.name}</h3>`;
      outputDiv.appendChild(card);
    });
  }
});
</script>

</body>
</html>
